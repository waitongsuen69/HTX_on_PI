<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>K Line Chart</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #0b0f14; color: #e6eef7; }
      .nav { display:flex; gap:10px; align-items:center; padding:10px 16px; background:#0d141d; border-bottom:1px solid #1a2330; position:sticky; top:0; z-index:10; }
      .nav a { color:#c9d7ee; text-decoration:none; padding:6px 10px; border-radius:8px; border:1px solid transparent; }
      .nav a.active { background:#13202e; border-color:#24354a; color:#fff; }
      .row { display:flex; gap:8px; align-items:center; padding:8px 16px; }
      select, input, button { background:#1a2330; color:#e6eef7; border:1px solid #2a3a52; padding:6px 10px; border-radius:8px; }
      #wrap { padding: 8px 16px; }
      canvas { width: 100%; height: 400px; background:#0f1722; border:1px solid #1a2330; border-radius:8px; display:block; }
      .legend { font-size: 12px; opacity: 0.8; padding: 0 16px; }
    </style>
    <script defer src="/kline.js"></script>
  </head>
  <body>
    <div class="nav">
      <a id="nav-dashboard" href="/">Dashboard</a>
      <a id="nav-lots" href="/lots.html">Lots</a>
      <a id="nav-kline" href="/kline.html" class="active">K Line</a>
    </div>
    <div class="row">
      <label>Symbol <input id="symbol" placeholder="BTC" /></label>
      <label>Period
        <select id="period">
          <option value="1min">1min</option>
          <option value="5min">5min</option>
          <option value="15min">15min</option>
          <option value="60min" selected>60min</option>
          <option value="4hour">4hour</option>
          <option value="1day">1day</option>
        </select>
      </label>
      <label>Count <input id="count" type="number" min="100" max="6000" value="6000" /></label>
      <button id="load">Load</button>
    </div>
    <div class="legend" id="legend"></div>
    <div id="wrap"><canvas id="chart"></canvas></div>
    <script>
      // set nav active if coming from other pages
      const p = location.pathname;
      if (p === '/' || p === '/index.html') document.getElementById('nav-dashboard').classList.add('active');
      if (p.endsWith('/lots.html')) document.getElementById('nav-lots').classList.add('active');
      if (p.endsWith('/kline.html')) document.getElementById('nav-kline').classList.add('active');
    </script>
  </body>
  </html>
