<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TradingView Chart</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #0b0f14; color: #e6eef7; }
      .nav { display:flex; gap:10px; align-items:center; padding:10px 16px; background:#0d141d; border-bottom:1px solid #1a2330; position:sticky; top:0; z-index:10; }
      .nav a { color:#c9d7ee; text-decoration:none; padding:6px 10px; border-radius:8px; border:1px solid transparent; }
      .nav a.active { background:#13202e; border-color:#24354a; color:#fff; }
      #chart-wrap { position: absolute; inset: 48px 0 0 0; }
      #tvchart { width: 100%; height: 100%; }
      .note { padding: 12px 16px; color: #c9d7ee; }
      .warn { color: #ffb74d; }
    </style>
    <!-- Charting Library file must be placed at /public/vendor/charting_library/ -->
    <script src="/vendor/charting_library/charting_library.js"></script>
    <script defer src="/tv-datafeed.js"></script>
  </head>
  <body>
    <div class="nav">
      <a id="nav-dashboard" href="/">Dashboard</a>
      <a id="nav-lots" href="/lots.html">Lots</a>
      <a id="nav-kline" href="/kline.html">K Line</a>
      <a id="nav-tv" href="/tv.html" class="active">TV Chart</a>
    </div>
    <div id="chart-wrap">
      <div id="tvchart"></div>
    </div>
    <div class="note" id="msg" style="display:none"></div>
    <script>
      (function(){
        const p = location.pathname;
        if (p === '/' || p === '/index.html') document.getElementById('nav-dashboard').classList.add('active');
        if (p.endsWith('/lots.html')) document.getElementById('nav-lots').classList.add('active');
        if (p.endsWith('/kline.html')) document.getElementById('nav-kline').classList.add('active');
        if (p.endsWith('/tv.html')) document.getElementById('nav-tv').classList.add('active');
      })();

      window.addEventListener('DOMContentLoaded', () => {
        const containerId = 'tvchart';
        const msg = document.getElementById('msg');
        if (!window.TradingView || !window.TradingView.widget) {
          msg.style.display = 'block';
          msg.innerHTML = '<span class="warn">TradingView Charting Library not found.</span> Place the library under <code>public/vendor/charting_library/</code> (get access from TradingView), then reload.';
          return;
        }

        const symbol = (new URL(location.href)).searchParams.get('symbol') || 'BTC';
        const interval = (new URL(location.href)).searchParams.get('interval') || '60';

        const widget = new TradingView.widget({
          symbol: symbol.toUpperCase(),
          interval: interval,
          container: containerId,
          library_path: '/vendor/charting_library/',
          datafeed: new window.HTXDatafeed('/api'),
          timezone: 'Etc/UTC',
          locale: 'en',
          autosize: true,
          theme: 'dark',
          // Enable left-side drawing toolbar and keep it visible
          enabled_features: ['left_toolbar', 'keep_left_toolbar_visible_on_small_screens'],
          disabled_features: ['use_localstorage_for_settings'],
        });

        // Optional: after chart is ready, you can tweak defaults (e.g., studies or visible range)
        widget.onChartReady(() => {
          // Drawing tools are part of the built-in toolbar
        });
      });
    </script>
  </body>
  </html>
